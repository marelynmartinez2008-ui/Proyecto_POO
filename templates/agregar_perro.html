<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Nuevo Perrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; padding: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Añadir nuevo integrante 🐾</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Nombre del perro" required>
            <input type="number" name="age" placeholder="Edad" required>
            <input type="text" name="breed" placeholder="Raza" required>
            <input type="text" name="image_url" placeholder="Nombre de la imagen (ej: rex.jpg)" required>
            <button type="submit">Guardar Perrito</button>
        </form>
        <br>
        <a href="/">Volver al catálogo</a>
    </div>
</body>
</html>
