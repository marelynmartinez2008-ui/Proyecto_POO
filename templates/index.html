<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Perritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 50px;
            font-size: 2.5rem;
        }

        .navbar {
            background: white; 
            padding: 15px 30px; 
            border-radius: 15px; 
            margin: 0 auto 30px auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            max-width: 1100px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .catalog-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Clase unificada para las tarjetas */
        .dog-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            padding: 20px;
            width: 280px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eee;
        }

        .dog-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .dog-img {
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin-bottom: 15px;
            background-color: #eee; /* Color de fondo si la imagen falla */
        }

        .dog-card h2 {
            color: #e67e22;
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .dog-card p {
            color: #7f8c8d;
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .btn-adopt {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-adopt:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1>🐾 Perritos en Catálogo 🐾</h1>

 <div class="navbar">
    <span>Bienvenido, <strong>{{ session['username'] }}</strong></span>
    <div>
        {% if session['role'] == 'admin' %}
            <a href="/historial" style="background-color: #3498db; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 10px; font-size: 0.9rem;">📋 Ver Historial</a>
            
            <a href="/agregar_perro" style="background-color: #27ae60; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-right: 10px; font-size: 0.9rem;">➕ Agregar Perro</a>
        {% endif %}
        
        <a href="/logout" style="color: #e74c3c; text-decoration: none; font-weight: bold; font-size: 0.9rem;">Cerrar Sesión</a>
    </div>
</div>

    <div class="catalog-container">
        {% for perro in perros %}
        <div class="dog-card">
            <img src="{{ url_for('static', filename='images/' + perro['image_url']) }}" 
                 alt="Foto de {{ perro['name'] }}" 
                 class="dog-img">
            
            <h2>{{ perro['name'] }}</h2>
            <p><strong>Edad:</strong> {{ perro['age'] }} años</p>
            <p><strong>Raza:</strong> {{ perro['breed'] }}</p>
            
            <a href="/adoptar/{{ perro['id'] }}" class="btn-adopt">¡Adóptame!</a>
            
        </div>
        {% endfor %}
    </div>

</body>
</html>
