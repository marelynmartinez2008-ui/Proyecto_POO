<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Adopción de Perritos</title>
    <style>
        .dog-card { border: 1px solid #ccc; padding: 20px; margin: 10px; width: 200px; text-align: center; display: inline-block; }
    </style>
</head>
<body>
    <h1>Perritos en Catálogo</h1>
<div class="contenedor-perros">
    {% for perro in perros %}
    <div class="card-perro">
        
        <img src="{{ url_for('static', filename='images/' + perro['image_url']) }}" 
             alt="Foto de {{ perro['name'] }}" 
             style="width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px;">
        
        <h2 style="color: #e67e22;">{{ perro['name'] }}</h2>
        <p><strong>Edad:</strong> {{ perro['age'] }} años</p>
        <p><strong>Raza:</strong> {{ perro['breed'] }}</p>
        
        <a href="/adoptar/{{ perro['id'] }}" class="btn-adoptar">¡Adoptame!</a>
    </div>
    {% endfor %}
</div>
    </div>
</body>
</html>
